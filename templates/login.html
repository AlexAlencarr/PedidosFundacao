<!DOCTYPE html>
<html>
<head>
    <title>Login - Sistema de Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column justify-content-center align-items-center" style="height: 100vh;">

    <img src="https://fundacaojav.com.br/wp-content/uploads/2025/10/cropped-fund_nogradient-removebg-preview.png" class="mb-4" style="width: 100px;">

    <div class="card p-4 shadow" style="width: 300px;">
        <h4 class="text-center mb-4">Sistema de Pedidos</h4>
        <form action="/login" method="POST">
            <div class="mb-3">
                <label>Usuário</label>
                <input type="text" name="usuario" class="form-control" placeholder="Seu nome" required>
            </div>
            <div class="mb-3">
                <label>Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <small class="d-block mt-3 text-center {% if erro %}text-danger fw-bold{% else %}text-muted{% endif %}">
            {% if erro %}
                {{ erro }}
            {% endif %}
        </small>

    </div>
</body>
</html>
